auth:
  allowed_domains: ["example.com"]
  allowed_emails: []

polling:
  tick_seconds: 60
  active_window_minutes: 5
  idle_interval_minutes: 60

board:
  epic_query: 'issuetype = Epic AND project = PG AND labels = "Priority" AND status != Done'
  # Optional. Issues that should appear in a leftmost "Unplanned" column.
  # Match all candidate tickets here (e.g. by Priority label); JiraSync will
  # exclude any whose parent is a tracked epic. Author the JQL with your own
  # recency clause if you want to also include recently-completed tickets,
  # e.g.: (statusCategory != Done OR resolved >= -7d)
  unplanned_query: 'project = PG AND labels = "Priority" AND issuetype != Epic AND (statusCategory != Done OR resolved >= -7d)'
  users:
    - { jira_username: "alice", display_name: "Alice" }
    - { jira_username: "bob",   display_name: "Bob" }
  status_map:
    "To Do":       "new"
    "In Progress": "in_progress"
    "In Review":   "review"
    "Done":        "done"
  new_statuses:  ["new"]
  done_statuses: ["done"]
  staleness:
    somewhat_days: 7
    really_days:   21
  ignore_staleness_for_new_issues: true
