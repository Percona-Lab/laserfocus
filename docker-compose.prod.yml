services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    volumes:
      - ./storage:/rails/storage
    environment:
      RAILS_ENV: production
      SOLID_QUEUE_IN_PUMA: "true"
    networks:
      - pg_projects

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - pg_projects

volumes:
  caddy_data:
  caddy_config:

networks:
  pg_projects:
    name: pg_projects
